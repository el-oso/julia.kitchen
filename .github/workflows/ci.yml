name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Julia recipe validator ─────────────────────────────────────────────────
  validate:
    name: Validate Julia examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"   # latest stable 1.x

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Install CI dependencies
        run: julia --project=ci -e 'using Pkg; Pkg.instantiate()'

      - name: Run example validator
        env:
          GKSwstype: nul        # GR backend: suppress display, write PNG directly
          GR_NO_DISPLAY: "true"
        run: julia --project=ci ci/run_examples.jl

  # ── Go runner ──────────────────────────────────────────────────────────────
  go:
    name: Build & test Go runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum

      - name: Build
        working-directory: runner
        run: go build -v ./...

      - name: Vet
        working-directory: runner
        run: go vet ./...

  # ── Docker image ───────────────────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    # Only build the Docker image on pushes to main (not every PR — it's slow)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: runner
          push: false          # set to true + add registry login when ready to publish
          tags: julia-kitchen/runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Hugo site build ────────────────────────────────────────────────────────
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

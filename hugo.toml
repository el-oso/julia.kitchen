baseURL = "https://julia.kitchen/"
locale = "en-us"
title = "julia.kitchen"
theme = "julia-kitchen"

[params]
  description = "Recipes for Julia programmers — from basics to advanced"
  juliaVersion = "1.12"
  # Base URL of the live PlutoSliderServer that serves interactive notebooks.
  # Dev default below; in production set this to the deployed HTTPS host
  # (must be HTTPS or the browser blocks the iframe as mixed content).
  sliderServerURL = "http://localhost:2345"
  # Base URL of the live BonitoBook server (WGLMakie demos). Same HTTPS caveat.
  bonitoServerURL = "http://localhost:8773"
  # Live Pluto editor (notebooks/edit.jl) for "Launch editable notebook" links.
  # plutoEditNotebook is the server-side path Pluto opens; local-dev default below.
  plutoEditURL = "http://localhost:1234"
  plutoEditNotebook = "/home/el_oso/Documents/julia.kitchen/notebooks/src/broadcasting_slider.jl"

  # Giscus comments — fill in after creating the GitHub repo and installing
  # the Giscus app (https://giscus.app). Set comments = true in recipe front matter to enable.
  [params.giscus]
    repo        = "OWNER/julia.kitchen"   # e.g. "myuser/julia.kitchen"
    repo_id     = "REPO_ID"              # from giscus.app
    category    = "Recipe Comments"
    category_id = "CATEGORY_ID"         # from giscus.app

[markup.highlight]
  style = "monokai"
  lineNos = false
  codeFences = true

[markup.goldmark.renderer]
  unsafe = true

# i18n infrastructure is in place; add language blocks here when translations are ready
[languages]
  [languages.en]
    label = "English"
    weight = 1
    contentDir = "content"

[taxonomies]
  category = "categories"
  tag = "tags"
  level = "levels"

{{ define "main" }}
<section class="search-page">
  <header class="section-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="section-intro">{{ . }}</div>{{ end }}
  </header>

  {{/* Pagefind UI. The /pagefind/ assets are generated by running `pagefind`
       against the built site (see build.sh / CI) — they do NOT exist under
       `hugo server`, so search only works on the built site. */}}
  <link href="/pagefind/pagefind-ui.css" rel="stylesheet">
  <div id="search" class="pagefind-search"></div>
  <noscript><p>Search requires JavaScript.</p></noscript>

  <script src="/pagefind/pagefind-ui.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false,
        excerptLength: 20,
      });
      // Prefill from ?q= so the nav search box can deep-link here.
      const q = new URLSearchParams(location.search).get("q");
      if (q) {
        const input = document.querySelector("#search input");
        if (input) {
          input.value = q;
          input.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    });
  </script>
</section>
{{ end }}
